# .github/workflows/daily_trawl.yml
#
# Runs the opportunity trawler every weekday morning at 7am UK time.
# Results are emailed to you automatically.
#
# SETUP:
# 1. Push this repo to GitHub
# 2. Go to Settings > Secrets and variables > Actions
# 3. Add these Repository Secrets:
#    - SMTP_USER  (your gmail address)
#    - SMTP_PASS  (your Gmail App Password)
#    - EMAIL_TO   (where to send the digest)

name: Daily Procurement Trawl

on:
  schedule:
    # 7:00 AM UTC = 8:00 AM BST (summer) / 7:00 AM GMT (winter)
    - cron: '0 7 * * 1-5'   # weekdays only

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to look back'
        required: false
        default: '1'

jobs:
  trawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run trawler
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          DAYS=${{ github.event.inputs.days || '1' }}
          python trawler.py --days $DAYS --email --output results_$(date +%Y%m%d).csv

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_number }}
          path: results_*.csv
          retention-days: 30
