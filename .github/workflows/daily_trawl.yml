name: Daily Procurement Trawl

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 7am UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to look back'
        required: false
        default: '7'
      debug:
        description: 'Run in debug mode? (yes/no)'
        required: false
        default: 'no'

jobs:
  trawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run trawler
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          DAYS="${{ github.event.inputs.days }}"
          DEBUG="${{ github.event.inputs.debug }}"
          if [ -z "$DAYS" ]; then DAYS="7"; fi
          echo "Searching last $DAYS days..."
          if [ "$DEBUG" = "yes" ]; then
            python trawler.py --debug
          else
            python trawler.py --days $DAYS --email --output results_$(date +%Y%m%d).csv
          fi

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_number }}
          path: results_*.csv
          if-no-files-found: ignore
          retention-days: 30
